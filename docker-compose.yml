services:
  db:
    image: postgres:16
    container_name: carniceria_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: carniceria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/database/init-scripts:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
